name: Docker Publish

# Build + push production image to Aliyun Container Registry.
#   - master push → :master, :sha-<short>, :latest
#   - tag v*.*.* → :vX.Y.Z, :latest
#
# Required secrets (repo Settings → Secrets → Actions):
#   ALIYUN_REGISTRY            e.g. registry.cn-hangzhou.aliyuncs.com
#   ALIYUN_NAME_SPACE          your ACR namespace
#   ALIYUN_REGISTRY_USER       ACR access username (aliyun@xxx)
#   ALIYUN_REGISTRY_PASSWORD   ACR access token/password (NOT your Alipay password)

on:
  push:
    branches: [master]
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      tag_override:
        description: "Extra tag to publish (optional)"
        required: false
        default: ""

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  IMAGE_NAME: ex_mmo_cluster

jobs:
  build-and-push:
    name: Build & push to Aliyun ACR
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ALIYUN_REGISTRY }}
          username: ${{ secrets.ALIYUN_REGISTRY_USER }}
          password: ${{ secrets.ALIYUN_REGISTRY_PASSWORD }}

      - name: Extract image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.ALIYUN_REGISTRY }}/${{ secrets.ALIYUN_NAME_SPACE }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ github.event.inputs.tag_override }},enable=${{ github.event.inputs.tag_override != '' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Print published tags
        run: |
          echo "Published tags:"
          echo "${{ steps.meta.outputs.tags }}"
