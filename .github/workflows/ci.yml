name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  MIX_ENV: test
  ELIXIR_ERL_OPTIONS: "+fnu"

permissions:
  contents: read

jobs:
  compile:
    name: Compile maintained apps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: "27.3"
          elixir-version: "1.18.4"

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ hashFiles('**/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-

      - name: Install dependencies
        run: mix deps.get

      - name: Compile shared dependencies
        run: |
          mix deps.compile
          cd apps/data_init && mix compile

      - name: Compile maintained apps (warnings as errors)
        run: |
          # Legacy Mnesia apps are excluded from strict compilation.
          # scene_server is compiled in its dedicated Rust-backed test job.
          apps=(
            apps/beacon_server
            apps/gate_server
            apps/agent_manager
            apps/agent_server
            apps/world_server
            apps/data_service
            apps/auth_server
            apps/visualize_server
          )

          for app in "${apps[@]}"; do
            echo "::group::Compiling ${app#apps/}"
            (cd "$app" && mix compile --warnings-as-errors --no-optional-deps)
            echo "::endgroup::"
          done

  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: "27.3"
          elixir-version: "1.18.4"

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: deps
          key: ${{ runner.os }}-mix-${{ hashFiles('**/mix.lock') }}

      - name: Install dependencies
        run: mix deps.get

      - name: Check formatting
        run: mix format --check-formatted

  test-gate-server:
    name: Test gate_server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: "27.3"
          elixir-version: "1.18.4"

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ hashFiles('**/mix.lock') }}

      - name: Install dependencies
        run: mix deps.get

      - name: Compile
        run: mix compile

      - name: Run gate_server tests
        run: cd apps/gate_server && mix test --no-start
        # 60 tests: codec, TCP framing, dispatch, edge cases

  test-beacon-server:
    name: Test beacon_server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: "27.3"
          elixir-version: "1.18.4"

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ hashFiles('**/mix.lock') }}

      - name: Install dependencies
        run: mix deps.get

      - name: Compile
        run: mix compile

      - name: Run beacon_server tests
        run: cd apps/beacon_server && mix test --no-start
        # 16 tests: beacon logic, client API, registration, requirements

  test-data-service:
    name: Test data_service
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: mmo_dev
          POSTGRES_PASSWORD: mmo_dev
          POSTGRES_DB: mmo_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: "27.3"
          elixir-version: "1.18.4"

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ hashFiles('**/mix.lock') }}

      - name: Install dependencies
        run: mix deps.get

      - name: Compile
        run: mix compile

      - name: Run Ecto migrations
        run: mix ecto.migrate -r DataService.Repo

      - name: Run data_service tests
        run: cd apps/data_service && mix test --no-start
        # 17 tests: Ecto schemas, worker CRUD, duplicate detection

  test-scene-server:
    name: Test scene_server (Rust NIFs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: "27.3"
          elixir-version: "1.18.4"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-mix-rust-${{ hashFiles('**/mix.lock', '**/Cargo.lock') }}

      - name: Install dependencies
        run: mix deps.get

      - name: Compile (including Rust NIFs)
        run: mix compile

      - name: Run scene_server tests
        run: cd apps/scene_server && mix test --no-start
        # 4 tests: NIF function calls (physics, character data)

  test-standalone:
    name: Test standalone apps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: "27.3"
          elixir-version: "1.18.4"

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ hashFiles('**/mix.lock') }}

      - name: Install dependencies
        run: mix deps.get

      - name: Compile
        run: mix compile --no-optional-deps

      - name: Run agent_server tests
        run: cd apps/agent_server && mix test --no-start

      - name: Run world_server tests
        run: cd apps/world_server && mix test --no-start

      - name: Run agent_manager tests
        run: cd apps/agent_manager && mix test --no-start
