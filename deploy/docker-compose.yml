# ex_mmo_cluster — single-server production stack
#
# Usage on server:
#   cd /opt/ex_mmo_cluster/deploy
#   cp .env.example .env   # edit with real secrets + domain
#   docker compose up -d
#
# Upgrade (after CI pushes a new image):
#   docker compose pull
#   docker compose up -d app
#
# MVP scope:
#   - one app container (all umbrella apps in one BEAM node)
#   - postgres container on internal network only
#   - HTTP ports bound to 127.0.0.1 only — host-side nginx terminates TLS
#     and reverse-proxies auth.${DOMAIN} / game.${DOMAIN} to these ports.
#     See deploy/nginx.conf.example for the matching nginx config.
#   - gate_server TCP exposed directly on host:${GATE_TCP_PORT} (custom
#     binary protocol, not HTTP — nginx http module can't proxy it)

# Pin the project name so container/network/volume names don't depend on the
# host directory layout (i.e. /opt/ex_mmo_cluster/deploy → would default to
# "deploy" otherwise). Resulting names: ex_mmo_cluster-app-1, ex_mmo_cluster-postgres-1.
name: ex_mmo_cluster

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${MMO_DB_USER}
      POSTGRES_PASSWORD: ${MMO_DB_PASSWORD}
      POSTGRES_DB: ${MMO_DB_NAME}
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${MMO_DB_USER} -d ${MMO_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    image: ${IMAGE_TAG}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      # Override DB host to use the compose service name, not whatever the
      # .env might have set for local dev.
      MMO_DB_HOST: postgres
    ports:
      # HTTP ports — bound to loopback so only host-side nginx can reach them.
      - "127.0.0.1:${AUTH_PORT}:4000"
      - "127.0.0.1:${VISUALIZE_PORT}:4001"
      # Plain TCP for the custom binary protocol — exposed directly.
      - "${GATE_TCP_PORT}:29000"
    networks:
      - internal

volumes:
  pg_data:

networks:
  internal:
    driver: bridge
