<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="data:," />
    <title>ex_mmo Voxel Web Client</title>
    <style>
      :root {
        color-scheme: dark;
        --panel-bg: rgba(8, 15, 22, 0.78);
        --panel-border: rgba(125, 170, 205, 0.22);
        --panel-shadow: rgba(0, 0, 0, 0.38);
      }
      html,
      body {
        margin: 0;
        height: 100%;
        background: #111;
        color: #eee;
        font-family: "Segoe UI", "Helvetica Neue", sans-serif;
        overflow: hidden;
      }
      #app {
        width: 100dvw;
        height: 100dvh;
        display: block;
      }
      #hud {
        position: fixed;
        top: 14px;
        left: 14px;
        z-index: 12;
        font-size: 12px;
        line-height: 1.5;
        pointer-events: none;
        text-shadow: 0 0 2px #000;
        white-space: pre;
        padding: 10px 12px;
        box-sizing: border-box;
        background: var(--panel-bg);
        border: 1px solid var(--panel-border);
        border-radius: 12px;
        box-shadow: 0 10px 30px var(--panel-shadow);
        backdrop-filter: blur(10px);
        max-width: min(520px, calc(100vw - 28px));
        max-height: calc(100vh - 28px);
        overflow: hidden;
      }
      #reticle {
        position: fixed;
        left: 50%;
        top: 50%;
        width: 18px;
        height: 18px;
        transform: translate(-50%, -50%);
        pointer-events: none;
      }
      #reticle::before,
      #reticle::after {
        content: "";
        position: absolute;
        background: rgba(191, 232, 255, 0.9);
        box-shadow: 0 0 8px rgba(191, 232, 255, 0.45);
      }
      #reticle::before {
        left: 50%;
        top: 0;
        width: 2px;
        height: 18px;
        transform: translateX(-50%);
      }
      #reticle::after {
        top: 50%;
        left: 0;
        width: 18px;
        height: 2px;
        transform: translateY(-50%);
      }
      #hotbar-dock {
        position: fixed;
        bottom: max(18px, env(safe-area-inset-bottom));
        left: 50%;
        width: min(760px, calc(100vw - 24px));
        box-sizing: border-box;
        transform: translateX(-50%);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
        pointer-events: auto;
        z-index: 10;
        color: #eef7fb;
        font-size: 11px;
      }
      #voxel-panel {
        position: fixed;
        right: 14px;
        top: 14px;
        z-index: 11;
        width: min(344px, calc(100vw - 28px));
        max-height: calc(100vh - 28px);
        overflow-y: auto;
        overscroll-behavior: contain;
        color: #eef7fb;
        font-size: 11px;
        pointer-events: auto;
      }
      #chat-panel {
        position: fixed;
        left: 14px;
        bottom: 104px;
        z-index: 11;
        width: min(360px, calc(100vw - 28px));
        color: #eef7fb;
        font-size: 11px;
        pointer-events: auto;
      }
      .chat-panel-surface {
        display: flex;
        flex-direction: column;
        gap: 7px;
        box-sizing: border-box;
        padding: 10px;
        border: 1px solid var(--panel-border);
        border-radius: 8px;
        background: rgba(8, 15, 22, 0.76);
        box-shadow: 0 10px 30px var(--panel-shadow);
        backdrop-filter: blur(12px);
      }
      .chat-panel-header,
      .chat-panel-scopes,
      .chat-panel-compose {
        display: flex;
        align-items: center;
        gap: 6px;
        min-width: 0;
      }
      .chat-panel-header {
        justify-content: space-between;
      }
      .chat-panel-title {
        overflow: hidden;
        color: rgba(238, 247, 251, 0.86);
        font-size: 12px;
        font-weight: 700;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .chat-panel-badge {
        flex: 0 0 auto;
        min-width: 58px;
        box-sizing: border-box;
        padding: 3px 7px;
        border: 1px solid rgba(126, 229, 178, 0.28);
        border-radius: 999px;
        background: rgba(53, 159, 117, 0.16);
        color: rgba(185, 255, 219, 0.9);
        text-align: center;
      }
      .chat-panel-scopes {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
      .chat-panel-scope,
      .chat-panel-compose button {
        min-width: 0;
        height: 28px;
        box-sizing: border-box;
        border: 1px solid rgba(196, 232, 255, 0.2);
        border-radius: 7px;
        background: rgba(28, 45, 55, 0.78);
        color: rgba(238, 247, 251, 0.88);
        cursor: pointer;
        font: inherit;
        transition:
          background 120ms ease,
          border-color 120ms ease,
          transform 120ms ease;
      }
      .chat-panel-scope:hover,
      .chat-panel-scope:focus-visible,
      .chat-panel-compose button:hover,
      .chat-panel-compose button:focus-visible {
        border-color: rgba(196, 232, 255, 0.62);
        background: rgba(47, 75, 87, 0.9);
        outline: none;
      }
      .chat-panel-scope:active,
      .chat-panel-compose button:active {
        transform: translateY(1px);
      }
      .chat-panel-scope.is-selected {
        border-color: rgba(126, 229, 178, 0.42);
        background: rgba(53, 159, 117, 0.28);
        color: rgba(213, 255, 234, 0.95);
      }
      .chat-panel-messages {
        display: flex;
        flex-direction: column;
        gap: 4px;
        max-height: 132px;
        min-height: 38px;
        margin: 0;
        padding: 0;
        overflow-y: auto;
        list-style: none;
      }
      .chat-panel-message,
      .chat-panel-empty {
        min-width: 0;
        box-sizing: border-box;
        padding: 5px 6px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 7px;
        background: rgba(18, 28, 35, 0.58);
      }
      .chat-panel-message span {
        display: block;
        overflow: hidden;
        color: rgba(255, 232, 150, 0.88);
        font-size: 10px;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .chat-panel-message p,
      .chat-panel-empty {
        margin: 1px 0 0;
        color: rgba(238, 247, 251, 0.78);
        line-height: 1.35;
        overflow-wrap: anywhere;
      }
      .chat-panel-compose input {
        flex: 1 1 auto;
        min-width: 0;
        height: 30px;
        box-sizing: border-box;
        border: 1px solid rgba(255, 255, 255, 0.11);
        border-radius: 7px;
        background: rgba(5, 11, 16, 0.66);
        color: rgba(238, 247, 251, 0.92);
        font: inherit;
        outline: none;
        padding: 0 7px;
      }
      .chat-panel-compose input:focus {
        border-color: rgba(196, 232, 255, 0.58);
      }
      .chat-panel-compose button {
        flex: 0 0 62px;
      }
      .chat-panel-result,
      .chat-panel-cli code {
        box-sizing: border-box;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 7px;
        background: rgba(18, 28, 35, 0.5);
      }
      .chat-panel-result {
        min-height: 26px;
        padding: 5px 6px;
        color: rgba(238, 247, 251, 0.68);
        line-height: 1.35;
        overflow-wrap: anywhere;
      }
      .chat-panel-result.is-ok {
        border-color: rgba(126, 229, 178, 0.28);
        color: rgba(185, 255, 219, 0.92);
      }
      .chat-panel-result.is-error {
        border-color: rgba(244, 120, 120, 0.34);
        color: rgba(255, 189, 189, 0.92);
      }
      .chat-panel-cli code {
        display: block;
        padding: 4px 5px;
        color: rgba(195, 229, 255, 0.78);
        font:
          10px/1.35 Consolas,
          "Courier New",
          monospace;
        overflow-wrap: anywhere;
      }
      .voxel-panel-surface {
        display: flex;
        flex-direction: column;
        gap: 8px;
        box-sizing: border-box;
        padding: 10px;
        border: 1px solid var(--panel-border);
        border-radius: 8px;
        background: rgba(8, 15, 22, 0.76);
        box-shadow: 0 10px 30px var(--panel-shadow);
        backdrop-filter: blur(12px);
      }
      .voxel-panel-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        min-width: 0;
      }
      .voxel-panel-title {
        overflow: hidden;
        color: rgba(238, 247, 251, 0.86);
        font-size: 12px;
        font-weight: 700;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .voxel-panel-badge {
        flex: 0 0 auto;
        min-width: 64px;
        box-sizing: border-box;
        padding: 3px 7px;
        border: 1px solid rgba(126, 229, 178, 0.34);
        border-radius: 999px;
        background: rgba(53, 159, 117, 0.18);
        color: rgba(185, 255, 219, 0.9);
        text-align: center;
      }
      .voxel-panel-badge.is-error {
        border-color: rgba(244, 120, 120, 0.42);
        background: rgba(151, 39, 39, 0.24);
        color: rgba(255, 203, 203, 0.96);
      }
      .voxel-panel-alerts {
        display: flex;
        flex-direction: column;
        gap: 4px;
        box-sizing: border-box;
        padding: 7px 8px;
        border: 1px solid rgba(244, 120, 120, 0.34);
        border-radius: 7px;
        background: rgba(78, 19, 24, 0.42);
        color: rgba(255, 213, 213, 0.96);
        line-height: 1.35;
      }
      .voxel-panel-alerts div {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .voxel-panel-stats {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 6px;
        margin: 0;
      }
      .voxel-panel-stat {
        min-width: 0;
        box-sizing: border-box;
        padding: 6px 7px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 7px;
        background: rgba(18, 28, 35, 0.66);
      }
      .voxel-panel-stat dt {
        margin: 0 0 2px;
        color: rgba(238, 247, 251, 0.45);
        font-size: 9px;
        text-transform: uppercase;
      }
      .voxel-panel-stat dd {
        margin: 0;
        overflow: hidden;
        color: rgba(238, 247, 251, 0.86);
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .voxel-panel-stat--field {
        grid-column: 1 / -1;
      }
      .voxel-panel-stat--field dd {
        white-space: normal;
      }
      .voxel-panel-actions,
      .voxel-panel-form {
        display: grid;
        gap: 6px;
      }
      .voxel-panel-actions {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      .voxel-panel-form--subscribe {
        grid-template-columns: repeat(4, minmax(0, 1fr)) minmax(74px, 0.9fr);
      }
      .voxel-panel-button {
        min-width: 0;
        height: 30px;
        box-sizing: border-box;
        border: 1px solid rgba(196, 232, 255, 0.22);
        border-radius: 7px;
        background: rgba(28, 45, 55, 0.82);
        color: rgba(238, 247, 251, 0.9);
        cursor: pointer;
        font: inherit;
        transition:
          background 120ms ease,
          border-color 120ms ease,
          transform 120ms ease;
      }
      .voxel-panel-button:hover,
      .voxel-panel-button:focus-visible {
        border-color: rgba(196, 232, 255, 0.66);
        background: rgba(47, 75, 87, 0.9);
        outline: none;
      }
      .voxel-panel-button:active {
        transform: translateY(1px);
      }
      .voxel-panel-input {
        display: flex;
        flex-direction: column;
        gap: 3px;
        min-width: 0;
      }
      .voxel-panel-input span {
        overflow: hidden;
        color: rgba(238, 247, 251, 0.48);
        font-size: 9px;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .voxel-panel-input input,
      .voxel-panel-input select {
        width: 100%;
        height: 30px;
        box-sizing: border-box;
        border: 1px solid rgba(255, 255, 255, 0.11);
        border-radius: 7px;
        background: rgba(5, 11, 16, 0.66);
        color: rgba(238, 247, 251, 0.92);
        font: inherit;
        outline: none;
        padding: 0 6px;
      }
      .voxel-panel-input input:focus,
      .voxel-panel-input select:focus {
        border-color: rgba(196, 232, 255, 0.58);
      }
      .voxel-panel-guidance {
        display: flex;
        flex-direction: column;
        gap: 6px;
        min-width: 0;
        padding-top: 8px;
        border-top: 1px solid rgba(255, 255, 255, 0.09);
      }
      .voxel-panel-guidance h3 {
        margin: 0;
        color: rgba(238, 247, 251, 0.66);
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0;
      }
      .voxel-panel-guidance p {
        margin: 0;
        color: rgba(238, 247, 251, 0.58);
        font-size: 10px;
        line-height: 1.4;
      }
      .voxel-panel-shortcut {
        display: grid;
        grid-template-columns: minmax(76px, 0.82fr) minmax(0, 1.2fr);
        gap: 7px;
        align-items: baseline;
        min-width: 0;
      }
      .voxel-panel-shortcut kbd {
        min-width: 0;
        padding: 2px 5px;
        overflow-wrap: anywhere;
        border: 1px solid rgba(196, 232, 255, 0.14);
        border-radius: 5px;
        background: rgba(5, 11, 16, 0.48);
        color: rgba(255, 232, 150, 0.92);
        font:
          700 10px/1.35 "Segoe UI",
          "Helvetica Neue",
          sans-serif;
      }
      .voxel-panel-shortcut span {
        min-width: 0;
        color: rgba(238, 247, 251, 0.72);
        font-size: 10px;
        line-height: 1.4;
        overflow-wrap: anywhere;
      }
      .voxel-panel-guidance--cli ul {
        display: flex;
        flex-direction: column;
        gap: 4px;
        margin: 0;
        padding: 0;
        list-style: none;
      }
      .voxel-panel-guidance--cli code {
        display: block;
        min-width: 0;
        padding: 4px 5px;
        overflow-wrap: anywhere;
        border: 1px solid rgba(196, 232, 255, 0.1);
        border-radius: 5px;
        background: rgba(5, 11, 16, 0.5);
        color: rgba(195, 229, 255, 0.86);
        font:
          10px/1.35 Consolas,
          "Courier New",
          monospace;
      }
      .voxel-panel-result {
        min-height: 28px;
        box-sizing: border-box;
        overflow: hidden;
        padding: 6px 7px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 7px;
        background: rgba(18, 28, 35, 0.58);
        color: rgba(238, 247, 251, 0.72);
        text-overflow: ellipsis;
        white-space: normal;
      }
      .voxel-panel-result.is-ok {
        border-color: rgba(126, 229, 178, 0.28);
        color: rgba(185, 255, 219, 0.92);
      }
      .voxel-panel-result.is-error {
        border-color: rgba(244, 120, 120, 0.34);
        color: rgba(255, 189, 189, 0.92);
      }
      .hotbar-current {
        max-width: 100%;
        min-height: 22px;
        box-sizing: border-box;
        padding: 4px 10px;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 8px;
        background: rgba(8, 15, 22, 0.54);
        color: rgba(238, 247, 251, 0.78);
        text-overflow: ellipsis;
        white-space: nowrap;
        backdrop-filter: blur(10px);
      }
      .hotbar-slots {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(48px, 1fr));
        gap: 6px;
        width: 100%;
        box-sizing: border-box;
        padding: 8px;
        border: 1px solid var(--panel-border);
        border-radius: 8px;
        background: rgba(8, 15, 22, 0.72);
        box-shadow: 0 12px 34px var(--panel-shadow);
        backdrop-filter: blur(12px);
      }
      .hotbar-slot {
        position: relative;
        display: grid;
        grid-template-rows: 12px 24px 12px;
        align-items: center;
        justify-items: center;
        min-width: 0;
        height: 56px;
        box-sizing: border-box;
        padding: 4px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 8px;
        background: rgba(21, 31, 38, 0.72);
        color: rgba(238, 247, 251, 0.84);
        cursor: pointer;
        transition:
          background 120ms ease,
          border-color 120ms ease,
          transform 120ms ease;
      }
      .hotbar-slot:hover,
      .hotbar-slot:focus-visible {
        border-color: rgba(196, 232, 255, 0.58);
        background: rgba(34, 50, 59, 0.88);
        outline: none;
      }
      .hotbar-slot.is-selected {
        border-color: rgba(244, 250, 255, 0.95);
        background: rgba(44, 71, 82, 0.94);
        transform: translateY(-2px);
      }
      .hotbar-slot.is-selected::after {
        content: "";
        position: absolute;
        top: 4px;
        right: 4px;
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #f4faff;
        box-shadow: 0 0 10px rgba(244, 250, 255, 0.75);
      }
      .hotbar-key {
        justify-self: start;
        margin-left: 3px;
        color: rgba(238, 247, 251, 0.5);
        font-size: 10px;
        line-height: 1;
      }
      .hotbar-label {
        max-width: 100%;
        overflow: hidden;
        color: rgba(238, 247, 251, 0.72);
        font-size: 10px;
        line-height: 1;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .hotbar-icon {
        display: block;
        width: 22px;
        height: 22px;
        box-sizing: border-box;
      }
      .hotbar-icon--material {
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 5px;
        background: var(--slot-color);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.28),
          0 2px 8px rgba(0, 0, 0, 0.24);
      }
      .hotbar-icon--sphere {
        border: 2px solid rgba(245, 205, 114, 0.96);
        border-radius: 50%;
        background: rgba(245, 205, 114, 0.18);
      }
      .hotbar-icon--cylinder {
        position: relative;
        border: 2px solid rgba(132, 217, 183, 0.96);
        border-radius: 8px;
        background: rgba(132, 217, 183, 0.14);
      }
      .hotbar-icon--cylinder::before,
      .hotbar-icon--cylinder::after {
        content: "";
        position: absolute;
        left: 3px;
        right: 3px;
        height: 4px;
        border: 1px solid rgba(132, 217, 183, 0.8);
        border-radius: 50%;
      }
      .hotbar-icon--cylinder::before {
        top: 2px;
      }
      .hotbar-icon--cylinder::after {
        bottom: 2px;
      }
      .hotbar-icon--stairs {
        position: relative;
        border-bottom: 3px solid rgba(216, 170, 128, 0.98);
        border-left: 3px solid rgba(216, 170, 128, 0.98);
      }
      .hotbar-icon--stairs::before,
      .hotbar-icon--stairs::after {
        content: "";
        position: absolute;
        background: rgba(216, 170, 128, 0.98);
      }
      .hotbar-icon--stairs::before {
        left: 4px;
        bottom: 7px;
        width: 14px;
        height: 3px;
      }
      .hotbar-icon--stairs::after {
        left: 10px;
        bottom: 14px;
        width: 8px;
        height: 3px;
      }
      .hotbar-icon--conductor,
      .hotbar-icon--conductor-junction,
      .hotbar-icon--power-terminal,
      .hotbar-icon--load-terminal {
        position: relative;
        border: 1px solid rgba(221, 232, 242, 0.48);
        border-radius: 5px;
        background: rgba(24, 34, 42, 0.82);
      }
      .hotbar-icon--conductor::before,
      .hotbar-icon--conductor-junction::before,
      .hotbar-icon--conductor-junction::after,
      .hotbar-icon--power-terminal::before,
      .hotbar-icon--load-terminal::before {
        content: "";
        position: absolute;
        background: rgba(190, 205, 216, 0.96);
        box-shadow: 0 0 8px rgba(197, 227, 255, 0.38);
      }
      .hotbar-icon--conductor::before,
      .hotbar-icon--conductor-junction::before,
      .hotbar-icon--power-terminal::before,
      .hotbar-icon--load-terminal::before {
        left: 2px;
        right: 2px;
        top: 9px;
        height: 4px;
        border-radius: 3px;
      }
      .hotbar-icon--conductor-junction::after {
        top: 2px;
        bottom: 2px;
        left: 9px;
        width: 4px;
        border-radius: 3px;
      }
      .hotbar-icon--power-terminal {
        border-color: rgba(255, 216, 102, 0.74);
        background: rgba(74, 57, 20, 0.72);
      }
      .hotbar-icon--power-terminal::after {
        content: "";
        position: absolute;
        right: 2px;
        top: 2px;
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #ffd866;
        box-shadow: 0 0 10px rgba(255, 216, 102, 0.7);
      }
      .hotbar-icon--load-terminal {
        border-color: rgba(41, 182, 246, 0.74);
        background: rgba(16, 55, 74, 0.72);
      }
      .hotbar-icon--load-terminal::after {
        content: "";
        position: absolute;
        right: 2px;
        top: 2px;
        width: 6px;
        height: 6px;
        border-radius: 2px;
        background: #29b6f6;
        box-shadow: 0 0 10px rgba(41, 182, 246, 0.7);
      }
      #touch-controls {
        position: fixed;
        inset: 0;
        z-index: 9;
        display: none;
        pointer-events: none;
      }
      #operation-guide {
        position: fixed;
        inset: 0;
        z-index: 30;
        pointer-events: none;
      }
      #operation-guide-toggle {
        position: fixed;
        top: calc(env(safe-area-inset-top, 0px) + 14px);
        right: calc(env(safe-area-inset-right, 0px) + 14px);
        z-index: 13;
        display: none;
        place-items: center;
        width: 44px;
        height: 44px;
        box-sizing: border-box;
        border: 1px solid rgba(196, 232, 255, 0.3);
        border-radius: 50%;
        background: rgba(8, 15, 22, 0.74);
        color: rgba(238, 247, 251, 0.94);
        cursor: pointer;
        font:
          700 20px/1 "Segoe UI",
          "Helvetica Neue",
          sans-serif;
        box-shadow: 0 10px 30px var(--panel-shadow);
        backdrop-filter: blur(10px);
        touch-action: manipulation;
      }
      #operation-guide-toggle:active {
        transform: translateY(1px);
      }
      #operation-guide.is-open {
        pointer-events: auto;
      }
      .operation-guide-backdrop {
        position: absolute;
        inset: 0;
        background: rgba(3, 7, 11, 0.66);
        backdrop-filter: blur(6px);
      }
      .operation-guide-dialog {
        position: absolute;
        top: 50%;
        left: 50%;
        display: flex;
        flex-direction: column;
        gap: 14px;
        width: min(720px, calc(100vw - 32px));
        max-height: min(680px, calc(100vh - 32px));
        box-sizing: border-box;
        padding: 18px;
        overflow: auto;
        transform: translate(-50%, -50%);
        border: 1px solid rgba(180, 222, 255, 0.24);
        border-radius: 8px;
        background: rgba(8, 15, 22, 0.94);
        box-shadow: 0 22px 70px rgba(0, 0, 0, 0.56);
        color: #eef7fb;
      }
      .operation-guide-header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 16px;
      }
      .operation-guide-kicker {
        margin: 0 0 4px;
        color: rgba(164, 210, 238, 0.72);
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0;
        text-transform: uppercase;
      }
      .operation-guide-header h2 {
        margin: 0;
        color: rgba(245, 251, 255, 0.96);
        font-size: 22px;
        line-height: 1.2;
      }
      .operation-guide-close {
        flex: 0 0 auto;
        min-width: 70px;
        height: 32px;
        box-sizing: border-box;
        border: 1px solid rgba(196, 232, 255, 0.24);
        border-radius: 7px;
        background: rgba(28, 45, 55, 0.82);
        color: rgba(238, 247, 251, 0.92);
        cursor: pointer;
        font: inherit;
        transition:
          background 120ms ease,
          border-color 120ms ease,
          transform 120ms ease;
      }
      .operation-guide-close:hover,
      .operation-guide-close:focus-visible {
        border-color: rgba(196, 232, 255, 0.66);
        background: rgba(47, 75, 87, 0.92);
        outline: none;
      }
      .operation-guide-close:active {
        transform: translateY(1px);
      }
      .operation-guide-content {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px 18px;
      }
      .operation-guide-touch {
        display: none;
      }
      html.is-touch .operation-guide-desktop {
        display: none;
      }
      html.is-touch .operation-guide-touch {
        display: grid;
      }
      .operation-guide-section {
        min-width: 0;
        padding-top: 10px;
        border-top: 1px solid rgba(255, 255, 255, 0.1);
      }
      .operation-guide-section h3 {
        margin: 0 0 7px;
        color: rgba(244, 250, 255, 0.88);
        font-size: 13px;
        line-height: 1.3;
      }
      .operation-guide-section ul {
        display: flex;
        flex-direction: column;
        gap: 6px;
        margin: 0;
        padding-left: 18px;
      }
      .operation-guide-section li {
        color: rgba(238, 247, 251, 0.76);
        font-size: 12px;
        line-height: 1.45;
      }
      .operation-guide-section strong,
      .operation-guide-section code {
        color: rgba(255, 232, 150, 0.94);
        font: inherit;
        font-weight: 700;
      }
      html.is-touch #touch-controls {
        display: block;
      }
      html.is-touch #operation-guide-toggle {
        display: grid;
      }
      html.is-touch #hud,
      html.is-touch #voxel-panel {
        display: none;
      }
      html.is-touch #chat-panel {
        top: max(12px, env(safe-area-inset-top));
        right: auto;
        bottom: auto;
        left: max(12px, env(safe-area-inset-left));
        width: min(360px, calc(100vw - 24px));
        max-height: calc(100vh - 24px);
      }
      html.is-touch #hotbar-dock {
        bottom: max(12px, env(safe-area-inset-bottom));
        width: min(620px, calc(100vw - 284px));
      }
      html.is-touch .hotbar-slots {
        grid-auto-flow: column;
        grid-auto-columns: minmax(42px, 1fr);
        grid-template-columns: none;
        gap: 5px;
        overflow-x: auto;
        overscroll-behavior-x: contain;
        padding: 7px;
      }
      html.is-touch .hotbar-slot {
        height: 50px;
        grid-template-rows: 10px 22px 10px;
      }
      html.is-touch .hotbar-label {
        font-size: 9px;
      }
      .touch-zone {
        position: absolute;
        top: 0;
        bottom: 0;
        pointer-events: auto;
        touch-action: none;
      }
      .touch-zone--left {
        left: 0;
        right: 50%;
        pointer-events: auto;
      }
      .touch-zone--right {
        left: 50%;
        right: 0;
        pointer-events: auto;
      }
      .touch-stick {
        position: fixed;
        width: 160px;
        height: 160px;
        border-radius: 50%;
        border: 2px solid rgba(255, 255, 255, 0.42);
        background: rgba(20, 28, 36, 0.32);
        pointer-events: none;
        display: none;
        transform: translate(-50%, -50%);
      }
      .touch-stick.is-active {
        display: block;
      }
      .touch-stick--left {
      }
      .touch-stick--right {
      }
      .touch-stick__nub {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 64px;
        height: 64px;
        margin: -32px 0 0 -32px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.78);
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.42);
      }
      .touch-buttons {
        position: fixed;
        right: calc(env(safe-area-inset-right, 0px) + 18px);
        bottom: calc(env(safe-area-inset-bottom, 0px) + 96px);
        display: grid;
        grid-template-columns: repeat(2, 64px);
        grid-template-rows: repeat(2, 64px);
        grid-template-areas:
          ". jump"
          "place break";
        gap: 10px;
        pointer-events: auto;
        touch-action: manipulation;
      }
      .touch-btn {
        width: 64px;
        height: 64px;
        border-radius: 50%;
        border: 1px solid rgba(255, 255, 255, 0.48);
        background: rgba(8, 15, 22, 0.62);
        color: #f4faff;
        font-size: 26px;
        line-height: 1;
        padding: 0;
        cursor: pointer;
        touch-action: manipulation;
      }
      .touch-btn:active {
        background: rgba(53, 80, 96, 0.92);
      }
      .touch-btn--jump {
        grid-area: jump;
      }
      .touch-btn--place {
        grid-area: place;
      }
      .touch-btn--break {
        grid-area: break;
      }
      .touch-ops {
        position: fixed;
        top: calc(env(safe-area-inset-top, 0px) + 14px);
        left: calc(env(safe-area-inset-left, 0px) + 14px);
        display: grid;
        grid-template-columns: repeat(2, minmax(74px, 1fr));
        gap: 8px;
        width: min(184px, calc(52vw - 20px));
        pointer-events: auto;
        touch-action: manipulation;
      }
      .touch-op {
        min-width: 0;
        min-height: 46px;
        box-sizing: border-box;
        border: 1px solid rgba(196, 232, 255, 0.26);
        border-radius: 8px;
        background: rgba(8, 15, 22, 0.72);
        color: rgba(238, 247, 251, 0.94);
        cursor: pointer;
        font:
          700 11px/1.15 "Segoe UI",
          "Helvetica Neue",
          sans-serif;
        overflow-wrap: anywhere;
        padding: 6px 7px;
        text-align: center;
        backdrop-filter: blur(10px);
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.28);
      }
      .touch-op:active {
        border-color: rgba(255, 232, 150, 0.72);
        background: rgba(47, 75, 87, 0.94);
        transform: translateY(1px);
      }
      .touch-op--primary {
        border-color: rgba(126, 229, 178, 0.34);
        background: rgba(30, 65, 56, 0.76);
      }
      .orientation-warning {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        background: rgba(0, 0, 0, 0.82);
        color: #eef7fb;
        font-size: 16px;
        line-height: 1.4;
        text-align: center;
        padding: 24px;
        pointer-events: auto;
      }
      @media (orientation: portrait) {
        html.is-touch .orientation-warning {
          display: flex;
        }
        html.is-touch .touch-zone,
        html.is-touch .touch-stick,
        html.is-touch .touch-buttons,
        html.is-touch .touch-ops {
          display: none;
        }
        html.is-touch #hotbar-dock {
          display: none;
        }
      }
      @media (max-width: 480px) {
        .operation-guide-dialog {
          width: calc(100vw - 20px);
          max-height: calc(100vh - 20px);
          padding: 14px;
        }
        .operation-guide-content {
          grid-template-columns: 1fr;
          gap: 12px;
        }
        .operation-guide-header h2 {
          font-size: 20px;
        }
        #hotbar-dock {
          width: min(366px, calc(100vw - 16px));
          bottom: max(12px, env(safe-area-inset-bottom));
        }
        .hotbar-slots {
          gap: 5px;
          padding: 7px;
        }
        .hotbar-slot {
          height: 50px;
          grid-template-rows: 10px 22px 10px;
        }
        .hotbar-label {
          font-size: 9px;
        }
      }
    </style>
  </head>
  <body>
    <canvas id="app"></canvas>
    <div id="touch-controls">
      <div class="orientation-warning" role="status">
        <p>请将设备旋转至横屏以游玩</p>
      </div>
      <div class="touch-zone touch-zone--left"></div>
      <div class="touch-zone touch-zone--right"></div>
      <div class="touch-stick touch-stick--left"><span class="touch-stick__nub"></span></div>
      <div class="touch-stick touch-stick--right"><span class="touch-stick__nub"></span></div>
      <div class="touch-buttons">
        <button class="touch-btn touch-btn--jump" type="button" aria-label="Jump">↑</button>
        <button class="touch-btn touch-btn--place" type="button" aria-label="Place block">+</button>
        <button class="touch-btn touch-btn--break" type="button" aria-label="Break block">✕</button>
      </div>
      <div class="touch-ops" aria-label="Mobile voxel operations">
        <button class="touch-op touch-btn--field" type="button" aria-label="Toggle field overlay">
          Field
        </button>
        <button class="touch-op touch-btn--heat" type="button" aria-label="Heat aimed block">
          Heat
        </button>
        <button
          class="touch-op touch-btn--conduct touch-op--primary"
          type="button"
          aria-label="Conduct aimed path"
        >
          Conduct
        </button>
        <button
          class="touch-op touch-btn--subscribe"
          type="button"
          aria-label="Subscribe aimed chunk"
        >
          Sub Aim
        </button>
      </div>
    </div>
    <div id="hud"></div>
    <div id="reticle" aria-hidden="true"></div>
    <div id="chat-panel" aria-live="polite"></div>
    <div id="voxel-panel" aria-live="polite"></div>
    <button id="operation-guide-toggle" type="button" aria-label="Open operation guide">?</button>
    <div id="operation-guide" aria-live="polite"></div>
    <div id="hotbar-dock" aria-live="polite"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
